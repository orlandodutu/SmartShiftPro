kind = "web"
previewPath = "/"
title = "Gestione Turni"
version = "1.0.0"
id = "artifacts/gestione-turni-react"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20587

[services.development]
run = "pnpm --filter @workspace/gestione-turni-react run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gestione-turni-react", "run", "build" ]
publicDir = "artifacts/gestione-turni-react/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20587"
BASE_PATH = "/"
