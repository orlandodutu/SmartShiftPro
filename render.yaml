services:
  - type: web
    name: smartshift-pro
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn --chdir flask-app wsgi:app
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: MASTER_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: COREPACK_ENABLE
        value: "0"
      - key: NODE_VERSION
        value: 20.11.0
