<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestione Turni{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; color: #1e293b; min-height: 100vh; }

        nav {
            background: linear-gradient(135deg, #1a56db, #1e40af);
            color: white;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            box-shadow: 0 2px 10px rgba(26,86,219,0.3);
        }
        nav .brand { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.5px; }
        nav .brand span { opacity: 0.7; font-weight: 400; margin-left: 8px; font-size: 0.9rem; }
        nav .nav-links { display: flex; gap: 4px; align-items: center; }
        nav a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        nav a:hover, nav a.active { background: rgba(255,255,255,0.2); color: white; }
        nav .user-info { font-size: 0.85rem; opacity: 0.8; }
        nav .logout-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        nav .logout-btn:hover { background: rgba(255,255,255,0.25); }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 24px;
        }
        .card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; color: #1a56db; }

        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 9px 18px; border-radius: 10px; border: none;
            cursor: pointer; font-size: 0.9rem; font-weight: 500;
            transition: all 0.2s; text-decoration: none;
        }
        .btn-primary { background: #1a56db; color: white; }
        .btn-primary:hover { background: #1e40af; transform: translateY(-1px); }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: #e2e8f0; color: #475569; }
        .btn-secondary:hover { background: #cbd5e1; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }

        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 0.78rem; font-weight: 600;
        }
        .badge-OSS { background: #dbeafe; color: #1e40af; }
        .badge-INFERMIERA { background: #d1fae5; color: #065f46; }
        .badge-PULIZIE { background: #fef3c7; color: #92400e; }
        .badge-DEV { background: #ede9fe; color: #5b21b6; }

        .turno-badge {
            display: inline-block; padding: 2px 10px; border-radius: 6px;
            font-size: 0.8rem; font-weight: 600;
        }
        .turno-MATTINO { background: #fef9c3; color: #854d0e; }
        .turno-POMERIGGIO { background: #fed7aa; color: #7c2d12; }
        .turno-NOTTE { background: #1e293b; color: #94a3b8; }
        .turno-FERIE { background: #bbf7d0; color: #14532d; }
        .turno-MALATTIA { background: #fee2e2; color: #991b1b; }
        .turno-RIPOSO { background: #e2e8f0; color: #475569; }

        .alert {
            padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; font-size: 0.9rem;
        }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 12px 14px; text-align: left; font-size: 0.82rem;
             font-weight: 600; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        tr:hover td { background: #f8fafc; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 500; color: #475569; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0;
            border-radius: 10px; font-size: 0.9rem; transition: border-color 0.2s;
            background: white;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: #1a56db;
            box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
        }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white; border-radius: 20px; padding: 28px;
            width: 90%; max-width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal h3 { font-size: 1.1rem; margin-bottom: 20px; color: #1a56db; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
{% if session.get('user_id') is not none or show_nav %}
<nav>
    <div class="brand">🏥 Gestione Turni <span id="nav-user-name"></span></div>
    <div class="nav-links">
        <a href="/dashboard" id="nav-dashboard">Dashboard</a>
        <a href="/turni" id="nav-turni">Turni</a>
        <span id="nav-admin-link" style="display:none"><a href="/staff">Staff</a></span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
        <span class="user-info" id="nav-role"></span>
        <button class="logout-btn" onclick="doLogout()">Esci</button>
    </div>
</nav>
{% endif %}

{% block content %}{% endblock %}

<script>
async function doLogout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/login';
}

async function loadNavUser() {
    try {
        const r = await fetch('/api/me');
        if (!r.ok) return;
        const u = await r.json();
        const el = document.getElementById('nav-user-name');
        if (el) el.textContent = u.nome;
        const role = document.getElementById('nav-role');
        if (role) role.textContent = u.ruolo;
        if (u.is_admin) {
            const adminLink = document.getElementById('nav-admin-link');
            if (adminLink) adminLink.style.display = 'inline';
        }
        const path = window.location.pathname;
        if (path === '/dashboard') document.getElementById('nav-dashboard')?.classList.add('active');
        if (path === '/turni') document.getElementById('nav-turni')?.classList.add('active');
    } catch(e) {}
}
loadNavUser();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
