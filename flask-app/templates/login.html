<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi - Gestione Turni</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a56db 0%, #1e40af 50%, #1e3a8a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            border-radius: 24px;
            padding: 44px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.25);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
        }
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a56db;
        }
        .logo p {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            background: #f8fafc;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1a56db;
            background: white;
            box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1a56db, #1e40af);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(26,86,219,0.4);
        }
        .btn-login:active { transform: translateY(0); }
        .error-msg {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.88rem;
            margin-bottom: 16px;
            display: none;
        }
        .hint {
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            font-size: 0.82rem;
        }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">
        <span class="icon">🏥</span>
        <h1>Gestione Turni</h1>
        <p>Sistema di gestione del personale</p>
    </div>
    <div class="error-msg" id="error-msg">Credenziali errate. Riprova.</div>
    <div class="form-group">
        <label>Nome utente</label>
        <input type="text" id="username" placeholder="es. Orlando" autofocus />
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="password123" />
    </div>
    <button class="btn-login" onclick="doLogin()">Accedi</button>
    <p class="hint">Password predefinita: <strong>password123</strong></p>
</div>

<script>
document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
});

async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('error-msg');
    errorEl.style.display = 'none';

    if (!username) {
        errorEl.textContent = 'Inserisci il nome utente.';
        errorEl.style.display = 'block';
        return;
    }

    const r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });

    if (r.ok) {
        window.location.href = '/dashboard';
    } else {
        errorEl.textContent = 'Credenziali errate. Riprova.';
        errorEl.style.display = 'block';
    }
}
</script>
</body>
</html>
